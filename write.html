<!DOCTYPE html>
<html>
<head>
  <title>메시지 입력</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial;
      color: white;

      background: linear-gradient(-45deg, #001f3f, #003366, #004080, #00264d);
      background-size: 400% 400%;
      animation: gradientMove 8s ease infinite;
    }

    .container {
      width: 90%;
      max-width: 400px;
      text-align: center;
    }

    input, textarea {
      width: 100%;
      margin-top: 10px;
      padding: 12px;
      font-size: 18px;
      border-radius: 10px;
      border: none;
    }

    textarea {
      height: 120px;
      resize: none;
    }

    button {
      margin-top: 15px;
      width: 100%;
      padding: 15px;
      font-size: 18px;
      font-weight: bold;
      border-radius: 10px;
      border: none;
      background: #00d4ff;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>💙 메시지 남기기</h2>

  <input id="name" placeholder="이름 (선택)">
  <textarea id="text" placeholder="메시지를 입력해주세요"></textarea>

  <button onclick="sendMessage()">전송</button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA5jr2U1r5FafSC6493ePuv-g6qtZ_iqyw",
    authDomain: "quality-campaign.firebaseapp.com",
    projectId: "quality-campaign",
    storageBucket: "quality-campaign.firebasestorage.app",
    messagingSenderId: "247809746725",
    appId: "1:247809746725:web:7f8e0950a475793afe1ccc",
    measurementId: "G-X9D2FWTB1T"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window.sendMessage = async function () {
    const text = document.getElementById("text").value;
    const name = document.getElementById("name").value;

    if (!text.trim()) return;

    await addDoc(collection(db, "messages"), {
      text: text,
      name: name,
      time: Date.now()
    });

    document.getElementById("text").value = "";
    document.getElementById("name").value = "";
  }
</script>

</body>
</html>
