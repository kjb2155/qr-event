<!DOCTYPE html>
<html>
<head>
  <title>메시지 입력</title>

  <!-- 📱 모바일 최적화 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial;
      color: white;

      background: linear-gradient(-45deg, #001f3f, #003366, #004080, #00264d);
      background-size: 400% 400%;
      animation: gradientMove 8s ease infinite;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      width: 90%;
      max-width: 400px;
      text-align: center;
    }

    .title {
      font-size: 26px;
      font-weight: bold;
      margin-bottom: 20px;
    }

    textarea {
      width: 100%;
      height: 120px;
      font-size: 18px;
      padding: 12px;
      border-radius: 10px;
      border: none;
      outline: none;
      resize: none;
      box-sizing: border-box;
    }

    button {
      margin-top: 15px;
      width: 100%;
      padding: 15px;
      font-size: 18px;
      font-weight: bold;
      border: none;
      border-radius: 10px;
      background: #00d4ff;
      color: black;
      cursor: pointer;
    }

    button:active {
      background: #00aacc;
    }

    .success {
      margin-top: 15px;
      font-size: 18px;
      color: #66ffcc;
      display: none;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="title">💙 Love our consumer</div>

  <textarea id="text" placeholder="메시지를 입력해주세요..."></textarea>

  <button onclick="sendMessage()">전송하기</button>

  <div id="success" class="success">✔ 전송 완료!</div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA5jr2U1r5FafSC6493ePuv-g6qtZ_iqyw",
    authDomain: "quality-campaign.firebaseapp.com",
    projectId: "quality-campaign",
    storageBucket: "quality-campaign.firebasestorage.app",
    messagingSenderId: "247809746725",
    appId: "1:247809746725:web:7f8e0950a475793afe1ccc",
    measurementId: "G-X9D2FWTB1T"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window.sendMessage = async function () {
    const text = document.getElementById("text").value;

    if (!text.trim()) return;

    await addDoc(collection(db, "messages"), {
      text: text,
      time: Date.now()
    });

    document.getElementById("text").value = "";
    document.getElementById("success").style.display = "block";

    setTimeout(() => {
      document.getElementById("success").style.display = "none";
    }, 2000);
  }
</script>

</body>
</html>
