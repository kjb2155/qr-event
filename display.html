<!DOCTYPE html>
<html>
<head>
  <title>메시지 월</title>
  <style>
    body {
      margin: 0;
      background: black;
      overflow: hidden;
      font-family: Arial;
    }

    #container {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    .msg {
      position: absolute;
      font-weight: bold;
      white-space: nowrap;
      animation: fadein 0.5s;
    }

    @keyframes fadein {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="container"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA5jr2U1r5FafSC6493ePuv-g6qtZ_iqyw",
      authDomain: "quality-campaign.firebaseapp.com",
      projectId: "quality-campaign",
      storageBucket: "quality-campaign.firebasestorage.app",
      messagingSenderId: "247809746725",
      appId: "1:247809746725:web:7f8e0950a475793afe1ccc",
      measurementId: "G-X9D2FWTB1T"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const container = document.getElementById("container");

    function randomColor() {
      const colors = ["#ff4d4d", "#4dd2ff", "#ffff66", "#66ff99", "#ff66ff", "#ffa64d"];
      return colors[Math.floor(Math.random() * colors.length)];
    }

    function randomSize() {
      return Math.floor(Math.random() * 40) + 20; // 20~60px
    }

    function randomPosition() {
      return {
        top: Math.random() * 90,
        left: Math.random() * 90
      };
    }

    const q = query(
      collection(db, "messages"),
      orderBy("time", "desc"),
      limit(30) // 👉 최대 30개 표시
    );

    onSnapshot(q, (snapshot) => {
      container.innerHTML = "";

      snapshot.forEach(doc => {
        const data = doc.data();

        const div = document.createElement("div");
        div.className = "msg";
        div.innerText = data.text;

        const pos = randomPosition();

        div.style.top = pos.top + "%";
        div.style.left = pos.left + "%";
        div.style.fontSize = randomSize() + "px";
        div.style.color = randomColor();

        container.appendChild(div);
      });
    });
  </script>
</body>
</html>
