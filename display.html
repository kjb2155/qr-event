<!DOCTYPE html>
<html>
<head>
  <title>Quality Message Wall</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial;
      color: white;
      background: linear-gradient(-45deg, #001f3f, #003366, #004080, #00264d);
      background-size: 400% 400%;
      animation: gradientMove 8s ease infinite;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .title {
      position: absolute;
      top: 20px;
      left: 30px;
      font-size: 32px;
      font-weight: bold;
      z-index: 10;
    }

    #container {
      position: relative;
      width: 100vw;
      height: calc(100vh - 80px);
      margin-top: 80px;
    }

    .msg {
      position: absolute;
      text-align: center;
      font-weight: bold;
      word-break: break-word;
      max-width: 220px;
      line-height: 1.2;

      animation: floatSafe 4s ease-in-out infinite alternate;
    }

    @keyframes floatSafe {
      0% { transform: translateY(-5px); }
      100% { transform: translateY(5px); }
    }
  </style>
</head>
<body>

<div class="title">💙 Love our consumer | Quality First</div>
<div id="container"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, onSnapshot, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA5jr2U1r5FafSC6493ePuv-g6qtZ_iqyw",
    authDomain: "quality-campaign.firebaseapp.com",
    projectId: "quality-campaign",
    storageBucket: "quality-campaign.firebasestorage.app",
    messagingSenderId: "247809746725",
    appId: "1:247809746725:web:7f8e0950a475793afe1ccc",
    measurementId: "G-X9D2FWTB1T"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const container = document.getElementById("container");

  function randomColor() {
    const colors = ["#00d4ff", "#66ffcc", "#ffffff", "#99ccff"];
    return colors[Math.floor(Math.random() * colors.length)];
  }

  function autoFontSize(len) {
    if (len > 80) return 14;
    if (len > 50) return 16;
    if (len > 30) return 18;
    return 22;
  }

  function randomPosition() {
    return {
      top: Math.random() * 90,
      left: Math.random() * 90
    };
  }

  function createMessage(text) {
    const div = document.createElement("div");
    div.className = "msg";
    div.innerText = text;

    div.style.fontSize = autoFontSize(text.length) + "px";
    div.style.color = randomColor();

    const pos = randomPosition();
    div.style.top = pos.top + "%";
    div.style.left = pos.left + "%";

    container.appendChild(div);
  }

  const q = query(
    collection(db, "messages"),
    orderBy("time", "desc"),
    limit(50) // 🔥 50개
  );

  onSnapshot(q, (snapshot) => {
    container.innerHTML = "";

    let messages = [];
    snapshot.forEach(doc => {
      messages.push(doc.data().text);
    });

    // 🔥 완전 랜덤 섞기
    messages.sort(() => Math.random() - 0.5);

    messages.forEach(text => {
      createMessage(text);
    });
  });
</script>

</body>
</html>
