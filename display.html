<!DOCTYPE html>
<html>
<head>
  <title>Quality Message Wall</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial;
      color: white;
      background: linear-gradient(-45deg, #001f3f, #003366, #004080, #00264d);
      background-size: 400% 400%;
      animation: gradientMove 8s ease infinite;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .title {
      position: absolute;
      top: 20px;
      left: 30px;
      font-size: 32px;
      font-weight: bold;
      z-index: 10;
    }

    #container {
      position: relative;
      width: 100vw;
      height: calc(100vh - 80px);
      margin-top: 80px;
    }

    .msg {
      position: absolute;
      max-width: 240px;
      padding: 10px;
      border-radius: 10px;
      background: rgba(0,0,0,0.3);
      word-break: break-word;
      line-height: 1.3;

      animation: floatSafe 4s ease-in-out infinite alternate;
    }

    .new {
      animation: pop 0.5s ease;
    }

    @keyframes pop {
      0% { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes floatSafe {
      0% { transform: translateY(-5px); }
      100% { transform: translateY(5px); }
    }

    .name {
      text-align: right;
      font-size: 12px;
      opacity: 0.8;
      margin-top: 5px;
    }
  </style>
</head>
<body>

<div class="title">💙 Love our consumer | Quality First</div>
<div id="container"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, onSnapshot, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA5jr2U1r5FafSC6493ePuv-g6qtZ_iqyw",
    authDomain: "quality-campaign.firebaseapp.com",
    projectId: "quality-campaign",
    storageBucket: "quality-campaign.firebasestorage.app",
    messagingSenderId: "247809746725",
    appId: "1:247809746725:web:7f8e0950a475793afe1ccc",
    measurementId: "G-X9D2FWTB1T"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const container = document.getElementById("container");

  let existingMessages = new Set();
  let positions = [];

  function randomColor() {
    const colors = ["#00d4ff", "#66ffcc", "#ffffff", "#99ccff"];
    return colors[Math.floor(Math.random() * colors.length)];
  }

  function autoFontSize(len) {
    if (len > 80) return 14;
    if (len > 50) return 16;
    if (len > 30) return 18;
    return 22;
  }

  function isOverlapping(x, y) {
    return positions.some(p =>
      Math.abs(p.x - x) < 15 && Math.abs(p.y - y) < 10
    );
  }

  function getSafePosition() {
    let pos;
    let tries = 0;

    do {
      pos = {
        x: Math.random() * 85,
        y: Math.random() * 85
      };
      tries++;
    } while (isOverlapping(pos.x, pos.y) && tries < 20);

    positions.push(pos);
    return pos;
  }

  function createMessage(id, text, name) {
    const div = document.createElement("div");
    div.className = "msg new";

    const content = document.createElement("div");
    content.innerText = text;

    const nameDiv = document.createElement("div");
    nameDiv.className = "name";
    nameDiv.innerText = name ? `- ${name} -` : "";

    div.appendChild(content);
    div.appendChild(nameDiv);

    div.style.fontSize = autoFontSize(text.length) + "px";
    div.style.color = randomColor();

    const pos = getSafePosition();
    div.style.left = pos.x + "%";
    div.style.top = pos.y + "%";

    container.appendChild(div);

    existingMessages.add(id);
  }

  const q = query(
    collection(db, "messages"),
    orderBy("time", "desc"),
    limit(100) // 🔥 100개 유지
  );

  onSnapshot(q, (snapshot) => {
    snapshot.forEach(doc => {
      const id = doc.id;
      if (!existingMessages.has(id)) {
        const data = doc.data();
        createMessage(id, data.text, data.name);
      }
    });
  });
</script>

</body>
</html>
