<!DOCTYPE html>
<html>
<head>
  <title>전광판 메시지</title>
  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    #message {
      font-size: 60px;
      text-align: center;
      padding: 40px;
      max-width: 80%;
      transition: opacity 0.5s;
    }
  </style>
</head>
<body>
  <div id="message">메시지를 기다리는 중...</div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA5jr2U1r5FafSC6493ePuv-g6qtZ_iqyw",
      authDomain: "quality-campaign.firebaseapp.com",
      projectId: "quality-campaign",
      storageBucket: "quality-campaign.firebasestorage.app",
      messagingSenderId: "247809746725",
      appId: "1:247809746725:web:7f8e0950a475793afe1ccc",
      measurementId: "G-X9D2FWTB1T"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let messages = [];
    let index = 0;

    const q = query(collection(db, "messages"), orderBy("time", "desc"));

    onSnapshot(q, (snapshot) => {
      messages = [];
      snapshot.forEach(doc => {
        messages.push(doc.data().text);
      });
    });

    function showMessage() {
      if(messages.length === 0) return;

      const el = document.getElementById("message");
      el.style.opacity = 0;

      setTimeout(() => {
        el.innerText = messages[index];
        el.style.opacity = 1;

        index = (index + 1) % messages.length;
      }, 500);
    }

    setInterval(showMessage, 3000); // 3초마다 변경
  </script>
</body>
</html>
