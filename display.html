<!DOCTYPE html>
<html>
<head>
  <title>Quality Message Wall</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial;
      color: white;
    }

    /* 🎨 배경 애니메이션 */
    body {
      background: linear-gradient(-45deg, #001f3f, #003366, #004080, #00264d);
      background-size: 400% 400%;
      animation: gradientMove 15s ease infinite;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    #container {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      grid-template-rows: repeat(5, 1fr);
      width: 100vw;
      height: 100vh;
      padding: 10px;
      box-sizing: border-box;
      gap: 10px;
    }

    .cell {
      position: relative;
      overflow: hidden;
    }

    .msg {
      position: absolute;
      font-weight: bold;
      white-space: nowrap;
      animation: float 10s linear infinite;
    }

    @keyframes float {
      0% { transform: translate(0, 0); }
      50% { transform: translate(20px, -20px); }
      100% { transform: translate(0, 0); }
    }

    .title {
      position: absolute;
      top: 20px;
      left: 30px;
      font-size: 30px;
      font-weight: bold;
      opacity: 0.8;
    }
  </style>
</head>
<body>

<div class="title">💙 Love our consumer | Quality First</div>
<div id="container"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, onSnapshot, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA5jr2U1r5FafSC6493ePuv-g6qtZ_iqyw",
    authDomain: "quality-campaign.firebaseapp.com",
    projectId: "quality-campaign",
    storageBucket: "quality-campaign.firebasestorage.app",
    messagingSenderId: "247809746725",
    appId: "1:247809746725:web:7f8e0950a475793afe1ccc",
    measurementId: "G-X9D2FWTB1T"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const container = document.getElementById("container");

  function randomColor() {
    const colors = ["#00d4ff", "#66ffcc", "#ffffff", "#99ccff"];
    return colors[Math.floor(Math.random() * colors.length)];
  }

  function randomSize() {
    return Math.floor(Math.random() * 20) + 20; // 20~40px
  }

  function createCellMessage(cell, text) {
    const div = document.createElement("div");
    div.className = "msg";
    div.innerText = text;

    div.style.fontSize = randomSize() + "px";
    div.style.color = randomColor();
    div.style.top = Math.random() * 50 + "%";
    div.style.left = Math.random() * 30 + "%";

    cell.appendChild(div);
  }

  const q = query(
    collection(db, "messages"),
    orderBy("time", "desc"),
    limit(30)
  );

  onSnapshot(q, (snapshot) => {
    container.innerHTML = "";

    let cells = [];
    for (let i = 0; i < 30; i++) {
      const cell = document.createElement("div");
      cell.className = "cell";
      container.appendChild(cell);
      cells.push(cell);
    }

    let i = 0;
    snapshot.forEach(doc => {
      if (cells[i]) {
        createCellMessage(cells[i], doc.data().text);
        i++;
      }
    });
  });
</script>

</body>
</html>
